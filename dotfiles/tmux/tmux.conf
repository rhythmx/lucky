# Setup plugins and sesnible defaults
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Seamless hjkl navigation between tmux panes and (neo)vim splits with
# Ctrl-h/j/k/l. Pairs with the christoomey/vim-tmux-navigator nvim plugin.
set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme
set -g @plugin 'catppuccin/tmux#latest'
set -g @catppuccin_flavor "mocha"

  # Powerline-style window segments with rounded/angled separators
set -g @catppuccin_window_status_style "rounded"   # or "slanted", "basic", "custom"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"
# Show the window NAME (#W, set by rename-window) on both active and inactive
# tabs. Catppuccin's default is " #T" — the pane title — which programs like
# claude-code overwrite via escape sequences, making inactive tabs flip names.
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

  # Status line layout — load modules you want on the right side
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_host}"
set -agF status-right "#{E:@catppuccin_status_date_time}"


# Modern terminfo inside tmux
set -g default-terminal "tmux-256color"

# Tell tmux the OUTER terminal (kitty) supports these — features pass through
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",xterm-kitty:hyperlinks"
set -as terminal-features ",xterm-kitty:usstyle"      # colored undercurls
set -as terminal-features ",xterm-kitty:ccolour"      # cursor color
set -as terminal-features ",xterm-kitty:strikethrough"

set -s extended-keys always
set -as terminal-features "xterm-kitty:extkeys"

# Let apps inside tmux emit raw escape sequences (kitty graphics, etc.)
set -g allow-passthrough on

# Modifier-key reporting (ctrl+shift+enter, etc.)
set -s extended-keys on
set -as terminal-features "xterm*:extkeys"

# OSC 52 clipboard so yanks reach your laptop's clipboard via kitty
set -g set-clipboard on

# Number windows and panes from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber remaining windows when one is closed (keeps the sequence gap-free)
set -g renumber-windows on

# Set prefix to F12 (this should also work with capslock if keyd is setup correctly)
unbind C-b
set -g prefix F12
bind F12 send-prefix    # press F12 twice to send literal F12 to the inner app

# Keybindings to shift numbering to my liking
bind -r '<' swap-window -t -1 \; select-window -t -1
bind -r '>' swap-window -t +1 \; select-window -t +1

bind , command-prompt -I "#W" "rename-window -- '%%'"

# Open new windows and splits in the current pane's directory rather than the
# directory tmux was started in.
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Set the mouse mode to on
set -g mouse on

# User-local overrides and additional plugins (declare before TPM runs)
if-shell 'test -f ~/.config/tmux/user.conf' 'source-file ~/.config/tmux/user.conf'

# Auto-install TPM and plugins if missing
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Auto-install any missing plugins listed in this config
run '~/.config/tmux/plugins/tpm/bin/install_plugins'

run '~/.config/tmux/plugins/tpm/tpm'

